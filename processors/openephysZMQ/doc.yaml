Description: Reads raw data from Open-Ephys acquisition software and converts it to a single stream of multi-channel data

Long description: Warning. The data format changed in the new version of open-ephys (0.6.x). 1.4 version of the processor is 
                  only compatible with this new version. Also, as the addition of resizable data packet allows to more flexibility 
                  when reading the data, the batch_size parameter has been removed. 
                  If you want a data fixed size, use a rebuffer processor after this one.
Output port:
  - name: data
    type: TimeSerieType <double>
    slots: 1
    description: the multichanneldata contains N channels (depend on nchannels) and P samples (depend on batch_size)

Options:
  - name: address
    type: string
    default: 127.0.0.1
    description: IP address of Open-Ephys zmq communication.
  - name: port
    type: unsigned int
    default: 5556
    description: Port of Open-Ephys zmq communication.
  - name: npackets
    type: uint64_t
    default: 0
    description: The total number of data packets to read (0 means continuous recording).

  - name: nchannels
    type: unsigned int
    default: 384
    description: The number of channels in the data packet sent by Open-Ephys.
  - name: missed samples/method
    type: string
    default: fill
    description: method could be fill (replace missing samples by a sample with the fill value, fail or ignore)
  - name: missed samples/value
    type: unsigned int
    default: 0
    description: The value to use to replace missing samples when missed samples/method is set to fill mode

