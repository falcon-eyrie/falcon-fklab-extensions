Description: Divide an event in two events -> detection (send ontime event if not locked out) and stimulations (send an event depending
  depending on 3 modes (disabled, ontime or with a delay randomly chosen in a range) if not locked out)
  There is also a lockout period to remove too close events and an option file logging of these events.

Long description :
    - Enabled state: enabled=true =  Only one detection event is sent ontime if not locked-out.
    - Ontime state:  delayed=false = A detection event + a stimulation event is sent ontime if not locked-out.
    - Delayed state: delayed=true = A detection event is sent immediatly + a stimulation event is sent once the delayed time is reached.


Input ports:
  - name: events
    type: EventData
    slots: 1
    description:

Output ports:
  - name: events
    type: EventData
    slots: 1
    description:

Options:
  - &disabled
    name: detection only mode
    type: bool
    default: false
    description: Disabled the processing of incoming events.

  - &delayed
    name: delayed mode
    type: bool
    default: False
    description: Enable the delay of the event for a time randomly chosen between the delay range
  - name: delay range
    type: long int
    default: "[150, 250] ms"
    description: if delayed event is true, the delayed time will be pseudo-randomly chosen in this range.

  - name: message/delayed
    type: string
    default: "d"
    description: Message to send on the stimulation port when the event has been delayed.
  - name: message/ontime
    type: string
    default: "o"
    description: Message to send on the detection port when an event is received
  - name: message/detection
    type: string
    default: "r"
    description: Message to send on the detection port when an event is received

  - &detection_lockout
    name: event trigger lockout time
    type: double
    default: 50 ms
    description: Lock out time for sending new detection/stimulation after a stimulation.

  - &analysis_lockout
    name: analysis lockout time
    type: double
    default: 50 ms
    description: Lock out time for detecting pattern after a stimulation 

  - name: enabled saving
    type: bool
    default: true
    description: Enable saving of target events to disk.
  - name: prefix
    type: string
    default: "stim_"
    description: add a prefix in the filename (prefix+eventname) where target event are saved

State:
  Static:
    - options: *detection_lockout
      external access: write
      shared: true
    - options: *analysis_lockout
      external access: write
      shared: true
  Follower:
    - options: *delayed
      external access: write
    - options: *disabled
      external access: write
    - name: analysis enabled
      external access: read