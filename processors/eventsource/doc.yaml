Description: Synchronizes on the occurrence of a target event on all its input slots, before emitting the same target event

Long description:

Input port :
  - name: events
    type: EventData
    slots: 1-256
    description:

Options:
  - name: events
    type: list of string
    default: "default_eventsource_event"
    description: list of events to emit
  - name: rate
    type: double
    default: 1Hz
    description: (approximate) event rate